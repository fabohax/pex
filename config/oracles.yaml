# Oracle Configuration
# Multi-oracle setup for PEX price feed consensus

oracles:
  - name: "Primary Oracle"
    address: "SP2XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX0"
    endpoint: "https://primary-oracle.example.com/api/price"
    source: "CMC"  # CoinMarketCap data source
    weight: 1
    health_check: "https://primary-oracle.example.com/health"
    
  - name: "Secondary Oracle"
    address: "SP2XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX1"
    endpoint: "https://secondary-oracle.example.com/api/price"
    source: "Binance API"
    weight: 1
    health_check: "https://secondary-oracle.example.com/health"
    
  - name: "Tertiary Oracle"
    address: "SP2XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX2"
    endpoint: "https://tertiary-oracle.example.com/api/price"
    source: "Coingecko"
    weight: 1
    health_check: "https://tertiary-oracle.example.com/health"

# Consensus Configuration
consensus:
  required_oracles: 2  # Minimum 2 of 3 oracles must agree
  price_deviation_threshold: 100  # 1% (in basis points)
  update_frequency_seconds: 300  # Update every 5 minutes
  timeout_seconds: 600  # 10 minutes before oracle is marked stale

# Data Sources for PEN/STX Pair
data_sources:
  primary: "PEN/USD exchange rate from Central Reserve Bank of Peru"
  secondary: "STX/USD price from major exchanges"
  conversion: "PEN/STX calculated as (PEN/USD) / (STX/USD)"

# Heartbeat Configuration
heartbeat:
  enabled: true
  interval_seconds: 60
  alert_on_failure: true
  max_consecutive_failures: 3
